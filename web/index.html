<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cycling Comfort &amp; Road Damage · Group 18</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="tum.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <img src="assets/tum-logo-blue.svg" alt="TUM" class="logo">
    <h1>Cycling Comfort &amp; Road Damage · Group 18</h1>
    <div id="switcher" class="switcher"></div>
  </header>
  <main class="layout">
    <div id="map"></div>
    <aside class="sidebar">
      <section class="cards" id="cards"></section>
      <section class="panel"><h3>Vibration &amp; Comfort</h3><canvas id="chart-vib"></canvas></section>
      <section class="panel"><h3>Environment</h3><canvas id="chart-env"></canvas></section>
      <section class="panel meta" id="meta"></section>
    </aside>
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
